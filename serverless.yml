service: img-stack

provider:
  name: aws
  runtime: php-82-fpm
  region: us-east-1
  stage: ${opt:stage, 'dev'}

  # Otimizações de custo
  memorySize: 512 # Reduzido para MVP
  timeout: 30 # Timeout padrão

  environment:
    APP_ENV: production
    SESSION_DRIVER: cookie
    LOG_CHANNEL: stderr
    APP_DEBUG: true
    FILESYSTEM_DRIVER: s3
    FILESYSTEM_DRIVER_PUBLIC: s3
    # Buckets
    AWS_BUCKET: ${self:service}-${opt:stage, self:provider.stage}-images
    AWS_BUCKET_CACHE: ${self:service}-${opt:stage, self:provider.stage}-cache
    # SQS
    SQS_QUEUE: ${self:service}-${opt:stage, self:provider.stage}-queue
    SQS_PREFIX:
      Fn::Sub: "https://sqs.${AWS::Region}.amazonaws.com/${AWS::AccountId}"
    # DynamoDB
    DYNAMODB_METADATA_TABLE: ${self:service}-${opt:stage, self:provider.stage}-metadata
    DYNAMODB_JOBS_TABLE: ${self:service}-${opt:stage, self:provider.stage}-jobs

  iam:
    role:
      statements:
        # S3 Permissions
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
            - s3:DeleteObject
            - s3:ListBucket
          Resource:
            - "arn:aws:s3:::${self:service}-${opt:stage, self:provider.stage}-images"
            - "arn:aws:s3:::${self:service}-${opt:stage, self:provider.stage}-images/*"
            - "arn:aws:s3:::${self:service}-${opt:stage, self:provider.stage}-cache"
            - "arn:aws:s3:::${self:service}-${opt:stage, self:provider.stage}-cache/*"

        # SQS Permissions
        - Effect: Allow
          Action:
            - sqs:SendMessage
            - sqs:ReceiveMessage
            - sqs:DeleteMessage
            - sqs:GetQueueAttributes
          Resource:
            - Fn::GetAtt: [ProcessingQueue, Arn]
            - Fn::GetAtt: [ProcessingDeadLetterQueue, Arn]

        # DynamoDB Permissions
        - Effect: Allow
          Action:
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
          Resource:
            - Fn::GetAtt: [ImageMetadataTable, Arn]
            - Fn::GetAtt: [ProcessingJobsTable, Arn]
            - Fn::Sub: "${ImageMetadataTable.Arn}/index/*"
            - Fn::Sub: "${ProcessingJobsTable.Arn}/index/*"

package:
  patterns:
    - "!node_modules/**"
    - "!public/storage"
    - "!resources/assets/**"
    - "!resources/css/**"
    - "!resources/images/**"
    - "!resources/js/**"
    - "!storage/**"
    - "!tests/**"
    - "!database/*.sqlite"
    - "!public/build/**"
    - "public/build/manifest.json"

functions:
  web:
    handler: public/index.php
    runtime: php-82-fpm
    layers:
      - ${bref-extra:imagick-php-82}
    timeout: 28 # Abaixo do limite do API Gateway
    memorySize: 512 # Mantém baixo para API
    events:
      - httpApi: "*"
    environment:
      FUNCTION_NAME: web
      CLOUDFRONT_DOMAIN:
        Fn::GetAtt: [CloudFrontDistribution, DomainName]

  artisan:
    handler: artisan
    runtime: php-82-console
    timeout: 720
    memorySize: 512 # Mantém baixo se não for usado
    # Descomente quando precisar de scheduled tasks
    # events:
    #   - schedule:
    #       rate: rate(5 minutes)
    #       input: '"schedule:run"'

  worker:
    handler: artisan
    runtime: php-82-console
    timeout: 300 # 5 minutos para processamento
    memorySize: 1024 # Um pouco mais para processamento de imagem
    events:
      - sqs:
          arn:
            Fn::GetAtt: [ProcessingQueue, Arn]
          batchSize: 1 # Processa uma imagem por vez
    environment:
      FUNCTION_NAME: worker
      QUEUE_CONNECTION: sqs

plugins:
  - ./vendor/bref/bref
  - ./vendor/bref/extra-php-extensions

resources:
  Resources:
    # Fila principal de processamento
    ProcessingQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-${opt:stage, self:provider.stage}-queue
        VisibilityTimeout: 330 # Pouco maior que o timeout do worker
        MessageRetentionPeriod: 345600 # 4 dias
        RedrivePolicy:
          deadLetterTargetArn:
            Fn::GetAtt: [ProcessingDeadLetterQueue, Arn]
          maxReceiveCount: 3

    # Fila para mensagens com falha
    ProcessingDeadLetterQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-${opt:stage, self:provider.stage}-dlq
        MessageRetentionPeriod: 1209600 # 14 dias

    # Bucket para imagens originais
    ImageBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:service}-${opt:stage, self:provider.stage}-images
        LifecycleConfiguration:
          Rules:
            - Id: DeleteOldUploads
              Status: Enabled
              ExpirationInDays: 30 # Remove após 30 dias para economizar
              NoncurrentVersionExpirationInDays: 7
        PublicAccessBlockConfiguration:
          BlockPublicAcls: true
          BlockPublicPolicy: true
          IgnorePublicAcls: true
          RestrictPublicBuckets: true

    # Bucket para imagens processadas (cache)
    CacheBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:service}-${opt:stage, self:provider.stage}-cache
        LifecycleConfiguration:
          Rules:
            - Id: DeleteOldCache
              Status: Enabled
              ExpirationInDays: 90 # Cache por 90 dias
              NoncurrentVersionExpirationInDays: 1
        CorsConfiguration:
          CorsRules:
            - AllowedHeaders: ["*"]
              AllowedMethods: [GET, PUT, HEAD]
              AllowedOrigins: ["*"]
              MaxAge: 3600
        PublicAccessBlockConfiguration:
          BlockPublicAcls: false
          BlockPublicPolicy: false
          IgnorePublicAcls: false
          RestrictPublicBuckets: false

    # Política para permitir acesso público ao bucket de cache
    CacheBucketPolicy:
      Type: AWS::S3::BucketPolicy
      Properties:
        Bucket:
          Ref: CacheBucket
        PolicyDocument:
          Statement:
            - Sid: PublicReadGetObject
              Effect: Allow
              Principal: "*"
              Action:
                - s3:GetObject
              Resource:
                Fn::Sub: "${CacheBucket.Arn}/*"

    # Tabela para metadados das imagens
    ImageMetadataTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-${opt:stage, self:provider.stage}-metadata
        BillingMode: PAY_PER_REQUEST # Sem custos fixos
        AttributeDefinitions:
          - AttributeName: image_id
            AttributeType: S
          - AttributeName: user_id
            AttributeType: S
          - AttributeName: created_at
            AttributeType: S
        KeySchema:
          - AttributeName: image_id
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: user_id-created_at-index
            KeySchema:
              - AttributeName: user_id
                KeyType: HASH
              - AttributeName: created_at
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: false # Desabilitado para economizar

    # Tabela para jobs de processamento
    ProcessingJobsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-${opt:stage, self:provider.stage}-jobs
        BillingMode: PAY_PER_REQUEST # Sem custos fixos
        AttributeDefinitions:
          - AttributeName: job_id
            AttributeType: S
          - AttributeName: image_id
            AttributeType: S
          - AttributeName: status
            AttributeType: S
          - AttributeName: created_at
            AttributeType: S
        KeySchema:
          - AttributeName: job_id
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: image_id-index
            KeySchema:
              - AttributeName: image_id
                KeyType: HASH
            Projection:
              ProjectionType: ALL
          - IndexName: status-created_at-index
            KeySchema:
              - AttributeName: status
                KeyType: HASH
              - AttributeName: created_at
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: false # Desabilitado para economizar

    CloudFrontDistribution:
      Type: AWS::CloudFront::Distribution
      Properties:
        DistributionConfig:
          Enabled: true
          PriceClass: PriceClass_100 # Apenas América do Norte e Europa para custo baixo no MVP
          Origins:
            # Origem para o bucket de cache
            - Id: S3Cache
              DomainName:
                Fn::GetAtt: [CacheBucket, RegionalDomainName]
              S3OriginConfig:
                OriginAccessIdentity: ""
            # Origem para API existente
            - Id: ImageProcessingAPI
              DomainName:
                Fn::Sub: "${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
              OriginPath: "/${opt:stage, self:provider.stage}"
              CustomOriginConfig:
                HTTPPort: 80
                HTTPSPort: 443
                OriginProtocolPolicy: https-only
          DefaultCacheBehavior:
            TargetOriginId: S3Cache
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
            CachedMethods:
              - GET
              - HEAD
              - OPTIONS
            ForwardedValues:
              QueryString: true # Para permitir parâmetros de transformação
              Cookies:
                Forward: none
            Compress: true
            DefaultTTL: 86400 # 1 dia
            MaxTTL: 31536000 # 1 ano
          # Comportamento especial para URLs de processamento
          CacheBehaviors:
            - PathPattern: "/v1/image/*"
              TargetOriginId: ImageProcessingAPI
              ViewerProtocolPolicy: redirect-to-https
              AllowedMethods:
                - GET
                - HEAD
                - OPTIONS
              CachedMethods:
                - GET
                - HEAD
                - OPTIONS
              ForwardedValues:
                QueryString: true
                Cookies:
                  Forward: none
              Compress: true
              DefaultTTL: 86400 # 1 dia

  # Outputs úteis
  Outputs:
    ApiEndpoint:
      Description: "API Gateway endpoint URL"
      Value:
        Fn::Sub: "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"

    ProcessingQueueUrl:
      Description: "URL of the SQS Queue"
      Value:
        Ref: ProcessingQueue

    ProcessingQueueArn:
      Description: "ARN of the SQS Queue"
      Value:
        Fn::GetAtt: [ProcessingQueue, Arn]

    ImageBucketName:
      Description: "Name of the images S3 bucket"
      Value:
        Ref: ImageBucket

    CacheBucketName:
      Description: "Name of the cache S3 bucket"
      Value:
        Ref: CacheBucket

    CacheBucketUrl:
      Description: "URL to access cached images"
      Value:
        Fn::Sub: "https://${CacheBucket}.s3.${AWS::Region}.amazonaws.com"

    CloudFrontURL:
      Description: "URL da distribuição CloudFront"
      Value:
        Fn::GetAtt: [CloudFrontDistribution, DomainName]
