service: img-stack

provider:
  name: aws
  runtime: php-82-fpm
  region: us-east-1
  stage: ${opt:stage, 'dev'}
  memorySize: 512
  timeout: 30
  environment:
    APP_ENV: production
    SESSION_DRIVER: cookie
    LOG_CHANNEL: stderr
    APP_DEBUG: false
    FILESYSTEM_DRIVER: s3
    FILESYSTEM_DRIVER_PUBLIC: s3
    AWS_BUCKET_CACHE: ${self:service}-${opt:stage, self:provider.stage}-cache
    SQS_QUEUE: ${self:service}-${opt:stage, self:provider.stage}-queue
    SQS_PREFIX:
      Fn::Sub: "https://sqs.${AWS::Region}.amazonaws.com/${AWS::AccountId}"
    DYNAMODB_METADATA_TABLE: ${self:service}-${opt:stage, self:provider.stage}-metadata
    DYNAMODB_JOBS_TABLE: ${self:service}-${opt:stage, self:provider.stage}-jobs
    CLOUDFRONT_DOMAIN:
      Fn::GetAtt: [CloudFrontDistribution, DomainName]
    CLOUDFRONT_PRIVATE_KEY: ${ssm:/img-stack/cloudfront-private-key}
    CLOUDFRONT_KEY_PAIR_ID: ${ssm:/img-stack/cloudfront-key-pair-id}
    SQS_QUEUE_URL:
      Fn::Sub: "https://sqs.${AWS::Region}.amazonaws.com/${AWS::AccountId}/${self:service}-${opt:stage, self:provider.stage}-queue"
    SKELETON_ENABLED: true
    ASYNC_PROCESSING_ENABLED: true
    QUEUE_CONNECTION: sqs
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
            - s3:DeleteObject
            - s3:ListBucket
          Resource:
            - "arn:aws:s3:::${self:service}-${opt:stage, self:provider.stage}-cache"
            - "arn:aws:s3:::${self:service}-${opt:stage, self:provider.stage}-cache/*"
        - Effect: Allow
          Action:
            - sqs:SendMessage
            - sqs:ReceiveMessage
            - sqs:DeleteMessage
            - sqs:GetQueueAttributes
          Resource:
            - Fn::GetAtt: [ProcessingQueue, Arn]
            - Fn::GetAtt: [ProcessingDeadLetterQueue, Arn]
        - Effect: Allow
          Action:
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
          Resource:
            - Fn::GetAtt: [ImageMetadataTable, Arn]
            - Fn::GetAtt: [ProcessingJobsTable, Arn]
            - Fn::Sub: "${ImageMetadataTable.Arn}/index/*"
            - Fn::Sub: "${ProcessingJobsTable.Arn}/index/*"

package:
  patterns:
    - "!node_modules/**"
    - "!public/storage"
    - "!resources/assets/**"
    - "!resources/css/**"
    - "!resources/images/**"
    - "!resources/js/**"
    - "!storage/**"
    - "!tests/**"
    - "!database/*.sqlite"
    - "!public/build/**"
    - "public/build/manifest.json"

functions:
  web:
    handler: public/index.php
    runtime: php-82-fpm
    layers:
      - ${bref-extra:imagick-php-82}
    timeout: 28
    memorySize: 512
    events:
      - httpApi: "*"
    environment:
      FUNCTION_NAME: web

  worker:
    handler: Bref\LaravelBridge\Queue\QueueHandler
    runtime: php-82
    timeout: 300
    memorySize: 1024
    layers:
      - ${bref-extra:imagick-php-82}
    events:
      - sqs:
          arn: !GetAtt ProcessingQueue.Arn
          batchSize: 1
    environment:
      FUNCTION_NAME: worker
      QUEUE_CONNECTION: sqs
      SQS_QUEUE: !Ref ProcessingQueue
      SQS_PREFIX: !Sub "https://sqs.${AWS::Region}.amazonaws.com/${AWS::AccountId}"

plugins:
  - ./vendor/bref/bref
  - ./vendor/bref/extra-php-extensions

resources:
  Resources:
    ProcessingQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-${opt:stage, self:provider.stage}-queue
        VisibilityTimeout: 330
        MessageRetentionPeriod: 345600
        RedrivePolicy:
          deadLetterTargetArn:
            Fn::GetAtt: [ProcessingDeadLetterQueue, Arn]
          maxReceiveCount: 3

    ProcessingDeadLetterQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-${opt:stage, self:provider.stage}-dlq
        MessageRetentionPeriod: 1209600

    CacheBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:service}-${opt:stage, self:provider.stage}-cache
        LifecycleConfiguration:
          Rules:
            - Id: DeleteOldCache
              Status: Enabled
              ExpirationInDays: 90
              NoncurrentVersionExpirationInDays: 1
        CorsConfiguration:
          CorsRules:
            - AllowedHeaders: ["*"]
              AllowedMethods: [GET, PUT, HEAD]
              AllowedOrigins: ["*"]
              MaxAge: 3600

    CloudFrontOriginAccessControl:
      Type: AWS::CloudFront::OriginAccessControl
      Properties:
        OriginAccessControlConfig:
          Name: ${self:service}-${opt:stage, self:provider.stage}-oac
          OriginAccessControlOriginType: s3
          SigningBehavior: always
          SigningProtocol: sigv4

    CacheBucketPolicy:
      Type: AWS::S3::BucketPolicy
      Properties:
        Bucket: !Ref CacheBucket
        PolicyDocument:
          Version: "2012-10-17"
          Statement:
            - Sid: AllowCloudFrontServicePrincipal
              Effect: Allow
              Principal:
                Service: cloudfront.amazonaws.com
              Action: s3:GetObject
              Resource: !Join ["", ["arn:aws:s3:::", !Ref CacheBucket, "/*"]]
              Condition:
                StringEquals:
                  AWS:SourceArn:
                    !Join [
                      "",
                      [
                        "arn:aws:cloudfront::",
                        !Ref AWS::AccountId,
                        ":distribution/",
                        !Ref CloudFrontDistribution,
                      ],
                    ]

    ImageMetadataTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-${opt:stage, self:provider.stage}-metadata
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: image_id
            AttributeType: S
          - AttributeName: user_id
            AttributeType: S
          - AttributeName: created_at
            AttributeType: S
        KeySchema:
          - AttributeName: image_id
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: user_id-created_at-index
            KeySchema:
              - AttributeName: user_id
                KeyType: HASH
              - AttributeName: created_at
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: false

    ProcessingJobsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-${opt:stage, self:provider.stage}-jobs
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: job_id
            AttributeType: S
          - AttributeName: image_id
            AttributeType: S
          - AttributeName: status
            AttributeType: S
          - AttributeName: created_at
            AttributeType: S
          - AttributeName: cache_key
            AttributeType: S
          - AttributeName: updated_at
            AttributeType: N
        KeySchema:
          - AttributeName: job_id
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: image_id-index
            KeySchema:
              - AttributeName: image_id
                KeyType: HASH
            Projection:
              ProjectionType: ALL
          - IndexName: status-created_at-index
            KeySchema:
              - AttributeName: status
                KeyType: HASH
              - AttributeName: created_at
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
          - IndexName: cache_key-updated_at-index
            KeySchema:
              - AttributeName: cache_key
                KeyType: HASH
              - AttributeName: updated_at
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: false

    CloudFrontDistribution:
      Type: AWS::CloudFront::Distribution
      Properties:
        DistributionConfig:
          Enabled: true
          PriceClass: PriceClass_100
          Origins:
            - Id: S3Cache
              DomainName:
                Fn::GetAtt: [CacheBucket, RegionalDomainName]
              S3OriginConfig:
                OriginAccessIdentity: ""
              OriginAccessControlId: !Ref CloudFrontOriginAccessControl
            - Id: ImageProcessingAPI
              DomainName:
                Fn::Sub: "${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
              OriginPath: ""
              CustomOriginConfig:
                HTTPPort: 80
                HTTPSPort: 443
                OriginProtocolPolicy: https-only
          DefaultCacheBehavior:
            TargetOriginId: S3Cache
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
            CachedMethods:
              - GET
              - HEAD
              - OPTIONS
            ForwardedValues:
              QueryString: true
              Cookies:
                Forward: none
            Compress: true
            DefaultTTL: 86400
            MaxTTL: 31536000
            TrustedKeyGroups:
              - ${ssm:/img-stack/cloudfront-key-group-id}
          CacheBehaviors:
            - PathPattern: "/api/v1/image/*"
              TargetOriginId: ImageProcessingAPI
              ViewerProtocolPolicy: redirect-to-https
              AllowedMethods:
                - GET
                - HEAD
                - OPTIONS
              CachedMethods:
                - GET
                - HEAD
                - OPTIONS
              ForwardedValues:
                QueryString: true
                Cookies:
                  Forward: none
              Compress: true
              DefaultTTL: 86400

  Outputs:
    ApiEndpoint:
      Description: "API Gateway endpoint URL"
      Value:
        Fn::Sub: "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"

    ProcessingQueueUrl:
      Description: "URL of the SQS Queue"
      Value:
        Ref: ProcessingQueue

    ProcessingQueueArn:
      Description: "ARN of the SQS Queue"
      Value:
        Fn::GetAtt: [ProcessingQueue, Arn]

    CacheBucketName:
      Description: "Name of the cache S3 bucket"
      Value:
        Ref: CacheBucket

    CacheBucketUrl:
      Description: "URL to access cached images"
      Value:
        Fn::Sub: "https://${CacheBucket}.s3.${AWS::Region}.amazonaws.com"

    CloudFrontURL:
      Description: "URL da distribuição CloudFront"
      Value:
        Fn::GetAtt: [CloudFrontDistribution, DomainName]
